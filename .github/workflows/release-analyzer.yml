name: Release Analyzer

on:
  pull_request:
    branches: [master]
    types: [closed]

permissions:
  contents: read

concurrency:
  group: production-analyzer
  cancel-in-progress: false

jobs:
  release:
    if: github.event.pull_request.merged == true
    name: Release analyzer
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Check out merged release revision
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          submodules: recursive

      - name: Set up Analyzer and Ansible
        working-directory: Backend/Analyzer
        run: |
          python3 -m pip install -r requirements.txt
          python3 -m pip install ansible docker

      - name: Train Analyzer models
        working-directory: Backend/Analyzer
        run: python3 train.py --data-dir data/train

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u divancode74 --password-stdin

      - name: Build Analyzer image
        working-directory: Backend/Analyzer/ansible/build
        run: ansible-playbook -i inventory playbook.yml --extra-vars="version=${{ github.event.pull_request.merge_commit_sha }}"

      - name: Deploy Analyzer
        working-directory: Backend/Analyzer/ansible/deploy
        env:
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
        run: |
          ANSIBLE_HOST_KEY_CHECKING=False ansible-playbook -i inventory playbook.yml \
            --extra-vars="version=${{ github.event.pull_request.merge_commit_sha }} ansible_user=root ansible_password=$SSH_PASSWORD"

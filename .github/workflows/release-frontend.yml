name: Release Frontend

on:
  pull_request:
    branches: [master]
    types: [closed]

permissions:
  contents: read

concurrency:
  group: production-frontend
  cancel-in-progress: false

jobs:
  release:
    if: github.event.pull_request.merged == true
    name: Release frontend
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Check out merged release revision
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          submodules: recursive

      - name: Set up Ansible
        run: python3 -m pip install ansible docker

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u divancode74 --password-stdin

      - name: Build Frontend image
        working-directory: Frontend/ansible/build
        run: ansible-playbook -i inventory playbook.yml --extra-vars="version=${{ github.event.pull_request.merge_commit_sha }} vite_base_url=${{ vars.VITE_BASE_URL }}"

      - name: Create Frontend SSH key file
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key.pem
          chmod 600 ~/.ssh/deploy_key.pem

      - name: Deploy Frontend
        working-directory: Frontend/ansible/deploy
        run: |
          ANSIBLE_HOST_KEY_CHECKING=False ansible-playbook -i inventory playbook.yml \
            --private-key ~/.ssh/deploy_key.pem \
            --extra-vars="version=${{ github.event.pull_request.merge_commit_sha }} ansible_user=ubuntu"

      - name: Clean up credentials
        if: always()
        run: rm -f ~/.ssh/deploy_key.pem
